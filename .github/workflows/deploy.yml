name: Deploy Lambda

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1  # update if you are in a different region
  AWS_LAMBDA_ROLE_ARN: arn:aws:iam::944508510733:role/lambda-image-processing-role  # replace with your ARN

jobs:
  deploy-metadata-extractor:
    name: Deploy Metadata Extractor Lambda
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push metadata-extractor image to Amazon ECR
        id: metadata-extractor-build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: metadata-extractor
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd lambda/metadata_extractor
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Check if Lambda function exists
        id: check-lambda-metadata-extractor
        run: |
          if aws lambda get-function --function-name metadata-extractor --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Lambda function
        if: steps.check-lambda-metadata-extractor.outputs.exists == 'false'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: metadata-extractor
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda create-function \
            --function-name metadata-extractor \
            --package-type Image \
            --code ImageUri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --role ${{ env.AWS_LAMBDA_ROLE_ARN }} \
            --timeout 30 \
            --memory-size 128 \
            --region ${{ env.AWS_REGION }}

      - name: Update metadata-extractor Lambda function
        if: steps.check-lambda-metadata-extractor.outputs.exists == 'true'
        uses: aws-actions/aws-lambda-deploy@v1.1.0
        with:
          function-name: metadata-extractor
          package-type: Image  # no zip!
          image-uri: ${{ steps.metadata-extractor-build-image.outputs.image }}  # ECR image URI from previous step
          role: ${{ env.AWS_LAMBDA_ROLE_ARN }}
          publish: true

  deploy-image-validator:
    name: Deploy Image Validator Lambda
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image-validator image to Amazon ECR
        id: image-validator-build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: image-validator
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd lambda/image_validator
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Check if Lambda function exists
        id: check-lambda-image-validator
        run: |
          if aws lambda get-function --function-name image-validator --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Lambda function
        if: steps.check-lambda-image-validator.outputs.exists == 'false'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: image-validator
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda create-function \
            --function-name image-validator \
            --package-type Image \
            --code ImageUri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --role ${{ env.AWS_LAMBDA_ROLE_ARN }} \
            --timeout 30 \
            --memory-size 128 \
            --region ${{ env.AWS_REGION }}

      - name: Update image-validator Lambda function
        if: steps.check-lambda-image-validator.outputs.exists == 'true'
        uses: aws-actions/aws-lambda-deploy@v1.1.0
        with:
          function-name: image-validator
          package-type: Image  # no zip!
          image-uri: ${{ steps.image-validator-build-image.outputs.image }}  # ECR image URI from previous step
          role: ${{ env.AWS_LAMBDA_ROLE_ARN }}
          publish: true
